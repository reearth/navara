name: Security audit
on:
    push:
        branches:
            - main
        paths:
            - "**/Cargo.toml"
            - "**/pnpm-lock.yaml"
    pull_request:
        paths:
            - "**/Cargo.toml"
            - "**/pnpm-lock.yaml"
    schedule:
        - cron: "0 6 * * 1" # Weekly Monday 6am UTC

permissions:
    contents: read

jobs:
    cargo-audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@1.86.0

            # Cache Rust build artifacts and dependencies
            - uses: Swatinem/rust-cache@v2
              with:
                shared-key: "rust-deps"
                cache-on-failure: true
                # Cache cargo-audit binaries
                cache-all-crates: true
            - name: Install cargo-audit
              uses: taiki-e/install-action@v2
              with:
                tool: cargo-audit
            - name: generate Cargo.lock
              run: cargo generate-lockfile
            - name: Run cargo audit
              run: cargo audit --file Cargo.lock

    pnpm-audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v5
              with:
                node-version: 22
            - uses: pnpm/action-setup@v4
              with:
                version: 10.16.1
                run_install: false
            # --ignore-registry-errors: audit will fail only if the registry actually successfully responds with found vulnerabilities
            - run: pnpm audit --audit-level=high --ignore-registry-errors
