name: Security audit
on:
    push:
        branches:
            - main
        paths:
            - "**/Cargo.toml"
            - "**/Cargo.lock"
            - "**/pnpm-lock.yaml"
    pull_request:
        paths:
            - "**/Cargo.toml"
            - "**/Cargo.lock"
            - "**/pnpm-lock.yaml"
    schedule:
        - cron: "0 6 * * 1" # Weekly Monday 6am UTC

permissions:
    contents: read

jobs:
    cargo-audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

             # Cache Rust build artifacts and dependencies
            - uses: Swatinem/rust-cache@v2
              with:
                shared-key: "rust-deps"
                cache-on-failure: true
                # Cache cargo-audit binaries
                cache-all-crates: true
            
            - name: Install cargo-audit
              run: which cargo-audit || cargo install cargo-audit --locked
            - name: generate Cargo.lock
              run: cargo generate-lockfile
            - name: Run cargo audit
              run: cargo audit --file Cargo.lock

    pnpm-audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v4
              with:
                node-version: 22
            - uses: pnpm/action-setup@v3
            - run: pnpm audit --audit-level=high --ignore-registry-errors
