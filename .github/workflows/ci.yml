name: Tests

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: "3.20.3"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          toolchain: 1.86.0
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      # Cache Rust build artifacts and dependencies
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-deps"
          cache-on-failure: true
          # Cache cargo-make and wasm-pack binaries
          cache-all-crates: true

      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      
      - uses: actions/setup-node@v5
        with:
          cache: "pnpm"

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}

      # Install cargo tools (these will be cached by rust-cache)
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Prepare
        run: cargo make prepare-ci
      
      - name: Run Build Example
        run: pnpm build:example
      
      - name: Run Test
        run: cargo make test
        env:
          RUST_BACKTRACE: 1
      
      - name: Cargo format
        run: cargo make format-check
      
      - name: Lint
        run: cargo make lint-check

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-docs"

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}

      - run: cargo test --doc
      - run: cargo doc --all-features --release