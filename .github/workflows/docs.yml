name: API docs

on:
  pull_request:
    paths:
      - docs/**
  push:
    branches:
      - main
    paths:
      - docs/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24.14.1'

      - name: Install dependencies
        run: pnpm install --filter navara-developer-docs

      - name: Build docs
        run: pnpm build:docs
