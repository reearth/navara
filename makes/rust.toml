[tasks.format-rust]
script = ['''
cargo fmt --all
''']

[tasks.format-check-rust]
script = ['''
cargo fmt --all --check
''']

[tasks.lint-rust]
script = ['''
cargo clippy --workspace --all-targets --all-features -- -D warnings
''']


[tasks.test-rust]
script = ['''
cargo test --workspace --all-targets --all-features
''']

[tasks.build-rust]
script = ['''
cd crates/navara_wasm
wasm-pack build --release --target web --out-dir ../../web/wasm/navara_engine
''']

[tasks.build-dev-rust]
script = ['''
cd crates/navara_wasm
wasm-pack build --dev --target web --out-dir ../../web/wasm/navara_engine
''']

[tasks.watch-rust]
script = ['''
cd crates/navara_wasm
cargo watch -i .gitignore -i "pkg/*" -s "wasm-pack build --dev --target web --features \"debug\" && cp -r ./pkg/** ../../web/wasm/navara_engine" --poll
''']

[tasks.watch-rust.windows]
script = ['''
cd crates/navara_wasm
cargo watch -i .gitignore -i "pkg/*" -s "wasm-pack build --dev --target web --features debug && robocopy .\\pkg\\ ..\\..\\web\\wasm\\navara_engine /Mir > nul" --poll
''']

[tasks.watch-release-rust]
script = ['''
cd crates/navara_wasm
cargo watch -i .gitignore -i "pkg/*" -s "wasm-pack build --release --target web --features \"debug\" && cp -r ./pkg/** ../../web/wasm/navara_engine" --poll
''']

[tasks.watch-release-rust.windows]
script = ['''
cd crates/navara_wasm
cargo watch -i .gitignore -i "pkg/*" -s "wasm-pack build --release --target web --features debug && robocopy .\\pkg\\ ..\\..\\web\\wasm\\navara_engine /Mir > nul" --poll
''']

[tasks.doc-rust]
script = ['''
cargo clean --doc
cargo doc --no-deps --all-features
''']
