# ============================================================================
#                               BUILD TASKS
# ============================================================================
# Build all WASM crates in a single cargo invocation to share compilation artifacts
[tasks.build-rust-all-wasm]
script = ['''
cargo build --release --target wasm32-unknown-unknown -p navara_wasm -p navara_wasm_worker -p navara_wasm_api
''']

[tasks.build-dev-rust-all-wasm]
script = ['''
cargo build --target wasm32-unknown-unknown -p navara_wasm -p navara_wasm_worker -p navara_wasm_api
''']

# Generate JS bindings for each WASM module
# Note: wasm-bindgen-cli version must match the wasm-bindgen dependency version (0.2.102)
# Install with: cargo install wasm-bindgen-cli --version 0.2.102
# Optional: Install binaryen for wasm-opt optimization: https://github.com/WebAssembly/binaryen
[tasks.bindgen-rust]
script = ['''
wasm-bindgen target/wasm32-unknown-unknown/release/navara_wasm.wasm --out-dir web/wasm/navara_engine --target web
if command -v wasm-opt &> /dev/null; then
    wasm-opt -O4 web/wasm/navara_engine/navara_wasm_bg.wasm -o web/wasm/navara_engine/navara_wasm_bg.wasm
fi
''']

[tasks.bindgen-rust.windows]
script = ['''
wasm-bindgen target/wasm32-unknown-unknown/release/navara_wasm.wasm --out-dir web/wasm/navara_engine --target web
where wasm-opt >nul 2>&1 && wasm-opt -O4 web/wasm/navara_engine/navara_wasm_bg.wasm -o web/wasm/navara_engine/navara_wasm_bg.wasm || echo "wasm-opt not found, skipping optimization"
''']

[tasks.bindgen-dev-rust]
script = ['''
wasm-bindgen target/wasm32-unknown-unknown/debug/navara_wasm.wasm --out-dir web/wasm/navara_engine --target web --keep-debug
''']
# ============================================================================
#                               CODE QUALITY TASKS
# ============================================================================
[tasks.format-rust]
script = ['''
cargo fmt --all
''']

[tasks.format-check-rust]
script = ['''
cargo fmt --all --check
''']

[tasks.lint-rust]
script = ['''
cargo clippy --workspace --all-targets --all-features -- -D warnings
''']


[tasks.test-rust]
script = ['''
cargo test --workspace --all-targets --all-features
''']

[tasks.doc-rust]
script = ['''
cargo clean --doc
cargo doc --no-deps --all-features
''']
