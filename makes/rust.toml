[tasks.format-rust]
script = ['''
cargo fmt --all
''']

[tasks.format-check-rust]
script = ['''
cargo fmt --all --check
''']

[tasks.lint-rust]
script = ['''
cargo clippy --workspace --all-targets --all-features -- -D warnings
''']


[tasks.test-rust]
script = ['''
cargo test --workspace --all-targets --all-features
''']

[tasks.build-rust]
script = ['''
cd crates/navara_wasm
wasm-pack build --out-dir ../../web/wasm/navara_engine --target web --release
''']

[tasks.build-dev-rust]
script = ['''
cargo build --target wasm32-unknown-unknown --package navara_wasm 
wasm-bindgen --keep-debug --out-dir ./web/wasm/navara_engine ./target/wasm32-unknown-unknown/debug/navara_wasm.wasm 
''']

[tasks.watch-rust]
script = ['''
cargo watch -i .gitignore -i "pkg/*" -s "cargo build --target wasm32-unknown-unknown --package navara_wasm && wasm-bindgen --keep-debug --out-dir ./web/wasm/navara_engine ./target/wasm32-unknown-unknown/debug/navara_wasm.wasm" --poll
" --poll
''']

[tasks.doc-rust]
script = ['''
cargo clean --doc
cargo doc --no-deps --all-features
''']
