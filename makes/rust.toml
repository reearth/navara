[tasks.format-rust]
script = ['''
REM #!/usr/bin/env bash -eux
cargo fmt --all
''']

[tasks.format-check-rust]
script = ['''
cargo fmt --all --check
''']

[tasks.lint-rust]
script = ['''
cargo clippy --workspace --all-targets --all-features -- -D warnings
''']


[tasks.test-rust]
script = ['''
cargo test --workspace --all-targets --all-features
''']

[tasks.build-rust]
script = ['''
cd crates/navara_wasm
wasm-pack build --out-dir ../../web/wasm/navara_engine --target web --release
''']

[tasks.build-dev-rust]
script = ['''
cd crates/navara_wasm
wasm-pack build --out-dir ../../web/wasm/navara_engine --target web
''']

[tasks.watch-rust]
script = ['''
cd crates/navara_wasm
cargo watch -i .gitignore -i "pkg/*" -s "wasm-pack build --profiling --target web --features debug && robocopy .\\pkg\\ ..\\..\\web\\wasm\\navara_engine /Mir" --poll
''']

[tasks.doc-rust]
script = ['''
cargo clean --doc
cargo doc --no-deps --all-features
''']
