wasm-bindgen target/wasm32-unknown-unknown/debug/navara_wasm_api.wasm --out-dir web/wasm/navara_engine_api --target web --keep-debug

# Generate package.json for pnpm workspace
cat > web/wasm/navara_engine_api/package.json << 'EOF'
{
  "name": "navara_wasm_api",
  "type": "module",
  "version": "0.1.0",
  "license": "MIT/Apache-2.0",
  "files": [
    "navara_wasm_api_bg.wasm",
    "navara_wasm_api.js",
    "navara_wasm_api.d.ts"
  ],
  "main": "navara_wasm_api.js",
  "types": "navara_wasm_api.d.ts",
  "sideEffects": [
    "./snippets/*"
  ]
}
EOF
''']

[tasks.bindgen-dev-rust-api.windows]
script = ['''
wasm-bindgen target/wasm32-unknown-unknown/debug/navara_wasm_api.wasm --out-dir web/wasm/navara_engine_api --target web --keep-debug

echo {"name": "navara_wasm_api", "type": "module", "version": "0.1.0", "license": "MIT/Apache-2.0", "main": "navara_wasm_api.js", "types": "navara_wasm_api.d.ts"} > web/wasm/navara_engine_api/package.json
''']