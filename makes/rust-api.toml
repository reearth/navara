# ============================================================================
#                               BUILD TASKS
# ============================================================================
# Generate JS bindings for API WASM module
[tasks.bindgen-rust-api]
script = ['''
#!/usr/bin/env bash

wasm-bindgen target/wasm32-unknown-unknown/release/navara_wasm_api.wasm --out-dir web/wasm/navara_engine_api --target web
if command -v wasm-opt &> /dev/null; then
    wasm-opt -O4 web/wasm/navara_engine_api/navara_wasm_api_bg.wasm -o web/wasm/navara_engine_api/navara_wasm_api_bg.wasm
  else
    echo "wasm-opt not found, skipping optimization"
fi

# Generate package.json for pnpm workspace
cp crates/navara_wasm_api/_package.json web/wasm/navara_engine_api/package.json
''']

[tasks.bindgen-rust-api.windows]
script = ['''
wasm-bindgen target/wasm32-unknown-unknown/release/navara_wasm_api.wasm --out-dir web/wasm/navara_engine_api --target web
where wasm-opt >nul 2>&1 && wasm-opt -O4 web/wasm/navara_engine_api/navara_wasm_api_bg.wasm -o web/wasm/navara_engine_api/navara_wasm_api_bg.wasm || echo "wasm-opt not found, skipping optimization"

 REM Generate package.json for pnpm workspace
copy /Y "crates\navara_wasm_api\_package.json" "web\wasm\navara_engine_api\package.json"
''']

[tasks.bindgen-dev-rust-api]
script = ['''
#!/usr/bin/env bash

wasm-bindgen target/wasm32-unknown-unknown/debug/navara_wasm_api.wasm --out-dir web/wasm/navara_engine_api --target web --keep-debug

# Generate package.json for pnpm workspace
cp crates/navara_wasm_api/_package.json web/wasm/navara_engine_api/package.json
''']

[tasks.bindgen-dev-rust-api.windows]
script = ['''
wasm-bindgen target/wasm32-unknown-unknown/debug/navara_wasm_api.wasm --out-dir web/wasm/navara_engine_api --target web --keep-debug

REM Generate package.json for pnpm workspace
copy /Y "crates\navara_wasm_api\_package.json" "web\wasm\navara_engine_api\package.json"
''']