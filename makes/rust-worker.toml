[tasks.build-rust-worker]
script = ['''
REM #!/usr/bin/env bash -eux
cd crates/navara_wasm_worker
wasm-pack build --out-dir ../../web/wasm/navara_engine_worker --target web --release
''']

[tasks.build-dev-rust-worker]
script = ['''
REM #!/usr/bin/env bash -eux
cd crates/navara_wasm_worker
wasm-pack build --out-dir ../../web/wasm/navara_engine_worker --target web
''']

[tasks.watch-rust-worker]
script = ['''
REM #!/usr/bin/env bash -eux
cd crates/navara_wasm_worker
cargo watch -i .gitignore -i "pkg/*" -s "wasm-pack build --profiling --target web && robocopy .\\pkg\\ ..\\..\\web\\wasm\\navara_engine_worker /Mir" --poll
''']
