[tasks.build-rust-worker]
script = ['''
#!/usr/bin/env bash -eux
cd crates/navara_wasm_worker
wasm-pack build --target web --release && cp -r ./pkg ../../web/wasm/navara_engine_worker
''']

[tasks.build-dev-rust-worker]
script = ['''
#!/usr/bin/env bash -eux
cd crates/navara_wasm_worker
wasm-pack build --target web && cp -r ./pkg ../../web/wasm/navara_engine_worker
''']

[tasks.watch-rust-worker]
script = ['''
#!/usr/bin/env bash -eux
cd crates/navara_wasm_worker
cargo watch -i .gitignore -i "pkg/*" -s "wasm-pack build --target web && cp -r ./pkg ../../web/wasm/navara_engine_worker" --poll
''']
