[workspace]

resolver = "2"

members = [
    "crates/*",
]

[workspace.package]
rust-version = "1.83.0"

[workspace.dependencies]
bevy_app = "0.15.3"
bevy_ecs = "0.15.3"
bevy_input = "0.15.3"
bevy_log = "0.15.3"
bevy_math = "0.15.3"
bevy_transform = "0.15.3"
approx = "0.5.1"
url = "2.5.3"
binrw = { version = "0.14.1", default-features = false }
serde = { version = "1.0.218", features = ["derive"] }
serde_json = { version = "1.0.140", features = ["preserve_order"] }
nanoid = "0.4"
cfg-if = "1.0.0"
radians = "0.3.1"
itertools = "0.14.0"
geo-types = "0.7.15"
instant = { version = "0.1.13", features = [ "wasm-bindgen", "inaccurate" ] }
fxhash = "0.2.1"

# --- WASM ---
wasm-bindgen = { version = "=0.2.100" }

js-sys = "0.3.77"
serde-wasm-bindgen = "0.6.5"
gloo-utils = { version = "0.2.0", features = ["serde"] }
web-sys = { version = "0.3.77", features = ["console"] }
