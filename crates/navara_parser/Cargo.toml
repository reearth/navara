[package]
name = "navara_parser"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]

[dependencies]
geojson_lib = { package = "geojson", version = "0.24.2"}
cesiumtiles = { git = "https://github.com/reearth/cesiumtiles-rs.git", branch = "feat/asset-extras" }
navara_b3dm = { path = "../navara_b3dm" }
navara_pnts = { path = "../navara_pnts" }
navara_glb = { path = "../navara_glb" }
navara_mvt_parser = { path = "../navara_mvt_parser" }

[package.metadata.wasm-pack.profile.dev.wasm-bindgen]
dwarf-debug-info = true