[package]
name = "navara_wasm_api"
version = "0.1.0"
edition = "2021"
license = "MIT/Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen.workspace = true
navara_core = { path = "../navara_core" }
navara_math = { path = "../navara_math" }
navara_wasm_types = { path = "../navara_wasm_types" }
navara_window = { path = "../navara_window" }
navara_camera = { path = "../navara_camera" }
navara_wasm_utils = { path = "../navara_wasm_utils" }

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"

[package.metadata.wasm-pack.profile.profiling]
wasm-opt = false

[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O4']
