[package]
name = "navara_wasm"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
debug = ["navara_ecs/debug"]

[dependencies]
wasm-bindgen.workspace = true
js-sys.workspace = true
serde.workspace = true
serde-wasm-bindgen.workspace = true
gloo-utils.workspace = true
bevy_log.workspace = true
web-sys.workspace = true
navara_core.workspace = true
navara_ecs.workspace = true
navara_layer.workspace = true
navara_material.workspace = true
navara_parser.workspace = true
navara_input.workspace = true
navara_event.workspace = true
navara_event_store.workspace = true
navara_math.workspace = true
navara_mesh.workspace = true
navara_data_requester.workspace = true
navara_texture_fragment.workspace = true
navara_feature_component.workspace = true
navara_geometry.workspace = true
navara_buffer_store.workspace = true
navara_tile_component.workspace = true
navara_worker.workspace = true
navara_wasm_types.workspace = true
navara_wasm_utils.workspace = true
navara_wasm_transferable.workspace = true
navara_quadtree.workspace = true
navara_globe.workspace = true
navara_font.workspace = true
rand.workspace = true
getrandom.workspace = true

[dev-dependencies]
wasm-bindgen-test.workspace = true

[package.metadata.wasm-pack.profile.profiling]
wasm-opt = false

[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O4']
