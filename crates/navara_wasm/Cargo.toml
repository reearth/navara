[package]
name = "navara_wasm"
version = "0.1.0"
edition = "2021"
license = "MIT/Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
debug = ["navara_ecs/debug"]

[dependencies]
wasm-bindgen.workspace = true

js-sys.workspace = true
serde.workspace = true
serde-wasm-bindgen.workspace = true
gloo-utils = { workspace = true, features = ["serde"] }
nanoid.workspace = true
bevy_log.workspace = true
web-sys = { workspace = true, features = ["console"] }

navara_core = { path = "../navara_core" }
navara_ecs = { path = "../navara_ecs" }
navara_layer = { path = "../navara_layer" }
navara_material = { path = "../navara_material" }
navara_parser = { path = "../navara_parser" }
navara_input = { path = "../navara_input" }
navara_event = { path = "../navara_event" }
navara_event_store = { path = "../navara_event_store" }
navara_math = { path = "../navara_math" }
navara_mesh = { path = "../navara_mesh" }
navara_data_requester = { path = "../navara_data_requester" }
navara_texture_fragment = { path = "../navara_texture_fragment" }
navara_feature_component = { path = "../navara_feature_component" }
navara_geometry = { path = "../navara_geometry" }
navara_buffer_store = { path = "../navara_buffer_store" }
navara_tile_component = { path = "../navara_tile_component" }
navara_worker = { path = "../navara_worker" }
navara_wasm_types = { path = "../navara_wasm_types" }
navara_wasm_utils = { path = "../navara_wasm_utils" }
navara_wasm_transferable = { path = "../navara_wasm_transferable" }

[dev-dependencies]
wasm-bindgen-test = "0.3.45"

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O4']
