[package]
name = "navara_wasm"
version = "0.1.0"
edition = "2021"
license = "MIT/Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
wasm-bindgen = { version = "0.2.94" }

# The `console_error_panic_hook` crate provides better debugging of panics by
# logging them with `console.error`. This is great for development, but requires
# all the `std::fmt` and `std::panicking` infrastructure, so isn't great for
# code size when deploying.
console_error_panic_hook = { version = "0.1.7", optional = true }
js-sys = "0.3.71"
serde = { version = "1.0.208", features = ["derive"] }
serde-wasm-bindgen = "0.6.5"
gloo-utils = { version = "0.1.0", features = ["serde"] }
nanoid = "0.4"
bevy_log = "0.14.2"

navara_core = { path = "../navara_core" }
navara_ecs = { path = "../navara_ecs" }
navara_layer = { path = "../navara_layer" }
navara_material = { path = "../navara_material" }
navara_parser = { path = "../navara_parser" }
navara_input = { path = "../navara_input" }
navara_event = { path = "../navara_event" }
navara_event_store = { path = "../navara_event_store" }
navara_math = { path = "../navara_math" }
navara_mesh = { path = "../navara_mesh" }
navara_data_requester = { path = "../navara_data_requester" }
navara_texture_fragment = { path = "../navara_texture_fragment" }
navara_feature = { path = "../navara_feature" }
navara_geometry = { path = "../navara_geometry" }
navara_buffer_store = { path = "../navara_buffer_store" }

[dependencies.web-sys]
version = "0.3.71"
features = ["console"]

[dev-dependencies]
wasm-bindgen-test = "0.3.44"

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"
