extend = [
    { path = "makes/rust.toml" },
    { path = "makes/rust-worker.toml" },
    { path = "makes/rust-api.toml" },
    { path = "makes/web.toml" },
]

[config]
skip_core_tasks = true
default_to_workspace = false

[env]
PROJ_NAME = "navara"

# ============================================================================
#         BUILD TASKS (cargo + wasm-bindgen, single compilation)
# ============================================================================
# Build all WASM crates in one cargo invocation (shared compilation artifacts)
# Then run wasm-bindgen for each output
[tasks.build-all]
description = "Build all WASM modules with shared compilation (release)"
run_task = { name = ["build-rust-all-wasm", "bindgen-all"], parallel = false }

[tasks.build-dev-all]
description = "Build all WASM modules with shared compilation (dev)"
run_task = { name = ["build-dev-rust-all-wasm", "bindgen-dev-all"], parallel = false }

# Run wasm-bindgen for all modules (can be parallel since cargo build is done)
[tasks.bindgen-all]
run_task = { name = ["bindgen-rust", "bindgen-rust-worker", "bindgen-rust-api"], parallel = true }

[tasks.bindgen-dev-all]
run_task = { name = ["bindgen-dev-rust", "bindgen-dev-rust-worker", "bindgen-dev-rust-api"], parallel = true }

# ============================================================================
#                               MAIN TASKS
# ============================================================================
[tasks.prepare]
# Need to prepare WASM module before running `pnpm i`. To make pnpm recognize WASM modules, these have to be handled as part of pnpm workspace.
# Using optimized build by default
run_task = { name = ["build-dev-all", "install-deps-web"] }

[tasks.prepare-ci]
# Need to prepare WASM module before running `pnpm i`. To make pnpm recognize WASM modules, these have to be handled as part of pnpm workspace.
run_task = { name = ["build-all", "install-deps-web"] }

[tasks.build]
run_task = { name = ["build-all", "build-web"] }

[tasks.build-dev]
run_task = { name = ["build-dev-all", "build-web"] }

[tasks.build-example]
run_task = { name = ["build-all", "build-web-example"] }

[tasks.test]
run_task = { name = ["test-rust", "test-web"], parallel = true }

# ============================================================================
#                         HOT-RELOAD DEVELOPMENT TASKS
# ============================================================================
[tasks.dev]
run_task = { name = ["watch", "dev-web"], parallel = true }

[tasks.web]
# Build WASM in release mode, but web is built in dev mode to improve development experience on Web.
run_task = { name = ["watch-prod", "dev-web"], parallel = true }

[tasks.watch]
script = ['''
cargo watch --watch "./crates" -s "cargo make build-dev-all" --poll
cargo watch --watch "./web" -s "cargo make build-web" --poll
''']

[tasks.watch-prod]
script = ['''
cargo watch --watch "./crates" -s "cargo make build-all" --poll
cargo watch --watch "./web" -s "cargo make build-web" --poll
''']

# ============================================================================
#                            CODE QUALITY TASKS
# ============================================================================
[tasks.lint]
run_task = { name = ["lint-rust", "lint-web"], parallel = true }

[tasks.lint-check]
run_task = { name = ["lint-rust", "lint-check-web"], parallel = true }

[tasks.format]
run_task = { name = ["format-rust", "format-web"], parallel = true }

[tasks.format-check]
run_task = { name = ["format-check-rust", "format-check-web"], parallel = true }

[tasks.doc]
run_task = { name = ["doc-rust"] }

[tasks.coverage]
script = ['''
#!/usr/bin/env bash -eux
rm -rf target/debug/deps/${PROJ_NAME}-*

export CARGO_INCREMENTAL=0
export RUSTFLAGS="-Zinstrument-coverage"
export LLVM_PROFILE_FILE="${PROJ_NAME}-%p-%m.profraw"

cargo build --workspace --verbose
cargo test --workspace --verbose

grcov . -s . --binary-path ./target/debug/ -t lcov --branch --ignore-not-existing -o lcov.info
''']

[tasks.check-easy-panic]
script = ['''
#!/usr/bin/env bash -eux
git ls-files |grep -E '.rs$' |(! xargs grep 'unimplemented!')
git ls-files |grep -E '.rs$' |(! xargs grep 'todo!')
''']
