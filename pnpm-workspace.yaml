packages:
  - web/**
  - debug_tile_server
  - docs

onlyBuiltDependencies:
  - canvas
  - esbuild
  - sharp

# Overrides to patch transitive dependencies flagged by `pnpm audit`.
# Each entry targets a specific vulnerable range so non-vulnerable majors
# (e.g. minimatch@3, picomatch@4 ≥ 4.0.4) keep their original versions.
overrides:
  minimatch@>=9.0.0 <9.0.7: ^9.0.7
  flatted@<3.4.2: ^3.4.2
  defu@<6.1.5: ^6.1.5
  fast-uri@<3.1.2: ^3.1.2
  devalue@>=5.6.3 <5.8.1: ^5.8.1
  express-rate-limit@>=8.2.0 <8.2.2: ^8.2.2
  path-to-regexp@>=8.0.0 <8.4.0: ^8.4.0
  picomatch@<2.3.2: ^2.3.2
  picomatch@>=4.0.0 <4.0.4: ^4.0.4
